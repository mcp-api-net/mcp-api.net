{% extends "base.html" %}
{% block content %}
<section class="py-5">
  <div class="container text-center" style="max-width: 560px;">
    {% if success %}
      <h1 class="fw-bold text-success">{{ t.payment_success_title }}</h1>
      <p class="lead">{{ t.payment_success_text }}</p>
    {% else %}
      <h1 class="fw-bold text-danger">{{ t.payment_fail_title }}</h1>
      <p class="lead">{{ t.payment_fail_text }}</p>
    {% endif %}
    <a href="/" class="btn btn-outline-secondary mt-3">{{ t.nav_home }}</a>
  </div>
</section>
{% endblock %}
