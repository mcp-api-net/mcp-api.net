{% extends "base.html" %}
{% block content %}
<section class="py-5">
  <div class="container" style="max-width: 820px;">
    <h1 class="fw-bold">{{ t.privacy_title }}</h1>
    <p class="text-secondary">{{ t.privacy_updated }}</p>
    <p class="lead">{{ t.privacy_intro }}</p>

    {% for i in range(1, 14) %}
      <h3 class="mt-4">{{ t['privacy_s' ~ i ~ '_title'] }}</h3>
      <p>{{ t['privacy_s' ~ i ~ '_text'] }}</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
